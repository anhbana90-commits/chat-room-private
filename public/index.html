<!DOCTYPE html>
<html>
<head>
    <title>Messenger v2 - Private Search</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background: #f0f2f5; margin: 0; }
        .container { max-width: 450px; margin: 15px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #lobby-area, #chat-area { display: none; }

        /* Nút Chat Nhanh */
        .quick-btn { 
            width: 100%; padding: 18px; background: #0084ff; color: white; border: none; 
            border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer;
            margin-bottom: 30px; transition: 0.2s;
        }
        .quick-btn:active { transform: scale(0.97); }

        /* Ô tìm kiếm phòng */
        .search-box { background: #f7f8fa; padding: 20px; border-radius: 12px; border: 1px solid #e4e6eb; }
        .search-box h4 { margin-top: 0; color: #1c1e21; }
        
        .input-group { display: flex; gap: 8px; margin-top: 10px; }
        input { padding: 12px 15px; border: 1px solid #ddd; border-radius: 25px; flex: 1; font-size: 16px; outline: none; }
        button.action-btn { padding: 10px 25px; background: #24b354; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* Khung chat */
        #messages { height: 60vh; overflow-y: auto; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 10px; display: flex; flex-direction: column; }
        .msg-box { padding: 10px 14px; border-radius: 18px; margin: 4px 0; max-width: 85%; font-size: 0.95em; line-height: 1.4; }
        .other-msg { align-self: flex-start; background: #e4e6eb; }
        .my-msg { align-self: flex-end; background: #0084ff; color: white; }
        .exit-btn { background: #f02849; width: 100%; margin-top: 15px; padding: 12px; color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-area" class="container">
        <h2 style="text-align:center; color:#0084ff;">Messenger v2</h2>
        <input type="text" id="username" style="width:100%; box-sizing:border-box;" placeholder="Tên của bạn...">
        <button class="quick-btn" style="margin-top:20px;" onclick="goToLobby()">Bắt đầu</button>
    </div>

    <div id="lobby-area" class="container">
        <button class="quick-btn" onclick="joinRoom('36')">
            ⚡ VÀO PHÒNG CHAT NHANH (36)
        </button>

        <div class="search-box">
            <h4>Tìm phòng bí mật</h4>
            <p style="font-size: 0.8em; color: #65676b;">Nhập mã phòng để tìm hoặc tạo mới:</p>
            <div class="input-group">
                <input type="text" id="search-id" placeholder="Nhập mã (VD: khang99)">
                <button class="action-btn" onclick="searchRoom()">Tìm</button>
            </div>
        </div>
    </div>

    <div id="chat-area" class="container">
        <h3 id="room-title" style="margin:0; padding-bottom:10px; border-bottom:1px solid #eee;">Phòng</h3>
        <div id="messages"></div>
        <form class="input-group" onsubmit="send(); return false;">
            <input type="text" id="msg" placeholder="Nhập tin nhắn..." autocomplete="off">
            <button class="action-btn" type="submit">Gửi</button>
        </form>
        <button class="exit-btn" onclick="location.reload()">Thoát</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUsername = "";

        function goToLobby() {
            myUsername = document.getElementById('username').value.trim();
            if(!myUsername) return alert("Nhập tên bạn nhé!");
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('lobby-area').style.display = 'block';
        }

        // Hàm tìm kiếm phòng
        function searchRoom() {
            const id = document.getElementById('search-id').value.trim();
            if(!id) return alert("Hãy nhập mã phòng!");
            socket.emit('check-room-exists', id);
        }

        // Lắng nghe kết quả tìm kiếm từ Server
        socket.on('room-exists-status', (data) => {
            if(data.exists) {
                joinRoom(data.id);
            } else {
                if(confirm("Mã '" + data.id + "' chưa có phòng. Bạn có muốn tạo luôn không?")) {
                    socket.emit('create-room', { 
                        roomID: data.id, 
                        roomName: "Phòng " + data.id, 
                        roomPass: "", 
                        username: myUsername 
                    });
                }
            }
        });

        function joinRoom(id) {
            socket.emit('join-room', { roomID: id, pass: "", username: myUsername });
        }

        socket.on('login-success', (data) => {
            document.getElementById('lobby-area').style.display = 'none';
            document.getElementById('chat-area').style.display = 'block';
            document.getElementById('room-title').innerText = data.roomName;
            document.getElementById('messages').innerHTML = "";
        });

        socket.on('create-success', (id) => joinRoom(id));

        // Logic gửi tin nhắn
        const msgDiv = document.getElementById('messages');
        function send() {
            const input = document.getElementById('msg');
            if(input.value.trim()) {
                socket.emit('send-chat', input.value);
                input.value = "";
            }
        }

        socket.on('chat-message', (data) => {
            const isMe = data.id === socket.id;
            msgDiv.innerHTML += `
                <div class="msg-box ${isMe ? 'my-msg' : 'other-msg'}">
                    ${!isMe ? `<b style="font-size:0.7em;">${data.user}</b><br>` : ''}
                    ${data.msg}
                </div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });

        socket.on('system-message', (m) => {
            msgDiv.innerHTML += `<div style="text-align:center; font-size:0.75em; color:#888; margin:10px 0;">${m}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });

        socket.on('error-msg', (m) => alert(m));
    </script>
</body>
</html>
